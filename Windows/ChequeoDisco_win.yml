---
- name: Verificar espacio en disco en Windows
  hosts: all
  gather_facts: no
  tasks:
    - name: Obtener espacio en disco C con PowerShell
      ansible.windows.win_shell: |
        $drive = Get-PSDrive C
        @{
          "Disco" = $drive.Name
          "Libre (GB)" = "{0:N2}" -f ($drive.Free/1GB)
          "Usado (GB)" = "{0:N2}" -f ($drive.Used/1GB)
          "Total (GB)" = "{0:N2}" -f (($drive.Free + $drive.Used)/1GB)
        } | ConvertTo-Json
      register: disk_c

    - name: Mostrar reporte de espacio en disco C
      debug:
        msg: |
          Reporte de Disco C:
          -------------------
          Libre: {{ (disk_c.stdout | from_json)["Libre (GB)"] }} GB
          Usado: {{ (disk_c.stdout | from_json)["Usado (GB)"] }} GB
          Total: {{ (disk_c.stdout | from_json)["Total (GB)"] }} GB
