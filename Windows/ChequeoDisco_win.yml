---
- name: Verificar espacio en disco en Windows
  hosts: all
  gather_facts: no
  tasks:
    - name: Obtener espacio en disco C con PowerShell
      ansible.windows.win_shell: |
        Get-PSDrive C | Select-Object Used,Free, @{Name="Total";Expression={$_.Used + $_.Free}}
      register: disk_c

    - name: Mostrar resultado
      debug:
        var: disk_c.stdout_lines
